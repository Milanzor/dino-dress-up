name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages.
# One-time setup: repo Settings → Pages → "Build and deployment" → Source =
# "GitHub Actions". After that, every push to main (or a manual run) deploys.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege tokens required by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build # runs prebuild (compile-ink) + tsc + vite build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
